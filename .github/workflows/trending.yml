name: Fetch TikTok Trending

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: write

jobs:
  fetch-trending:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install TikTokApi playwright
          playwright install webkit --with-deps

      - name: Fetch top 50 trending videos
        env:
          MS_TOKEN: ${{ secrets.MS_TOKEN }}
        run: |
          python - <<'PYEOF'
          import asyncio, json, os, time, sys
          from pathlib import Path
          from TikTokApi import TikTokApi

          OUTPUT_DIR = Path("trending")
          OUTPUT_DIR.mkdir(exist_ok=True)

          ms_token = os.environ.get("MS_TOKEN", "").strip() or None
          print(f"MS_TOKEN provided: {'YES (' + ms_token[:12] + '...)' if ms_token else 'NO - will try auto-detect'}")

          async def main():
              results = []
              async with TikTokApi() as api:
                  print("Creating session...")
                  await api.create_sessions(
                      num_sessions=1,
                      browser="webkit",
                      headless=True,
                      sleep_after=5,
                      ms_tokens=[ms_token] if ms_token else None,
                      suppress_resource_load_types=["image", "media", "font"],
                      starting_url="https://www.tiktok.com",
                  )

                  if api.sessions:
                      acquired = api.sessions[0].ms_token
                      print(f"Session msToken: {'YES (' + acquired[:12] + '...)' if acquired else 'NO'}")

                  print("\nFetching trending videos...")
                  try:
                      async for video in api.trending.videos(count=50):
                          info = video.as_dict
                          vid_id  = info.get("id") or info.get("aweme_id", "")
                          author  = (info.get("author") or {}).get("uniqueId", "unknown")
                          desc    = info.get("desc", "")[:120]
                          stats   = info.get("stats") or info.get("statistics") or {}
                          likes   = stats.get("diggCount", 0)
                          plays   = stats.get("playCount", 0)
                          url     = f"https://www.tiktok.com/@{author}/video/{vid_id}"
                          results.append({
                              "rank":   len(results) + 1,
                              "url":    url,
                              "author": author,
                              "id":     vid_id,
                              "desc":   desc,
                              "likes":  likes,
                              "plays":  plays,
                          })
                          print(f"  [{len(results):02d}] @{author}  \u2764 {likes:,}")
                          if len(results) >= 50:
                              break
                  except Exception as e:
                      print(f"ERROR: {e}")
                      if not results:
                          sys.exit(1)

              print(f"\nTotal: {len(results)} videos")

              (OUTPUT_DIR / "trending.json").write_text(
                  json.dumps(results, indent=2, ensure_ascii=False))
              (OUTPUT_DIR / "trending_urls.txt").write_text(
                  "\n".join(r["url"] for r in results) + "\n")

              md  = f"# TikTok Trending \u2014 {time.strftime('%Y-%m-%d %H:%M UTC')}\n\n"
              md += "| # | Author | Likes | Plays | Link |\n"
              md += "|---|--------|-------|-------|------|\n"
              for r in results:
                  md += f"| {r['rank']} | @{r['author']} | {r['likes']:,} | {r['plays']:,} | [video]({r['url']}) |\n"
              (OUTPUT_DIR / "trending.md").write_text(md)
              print("Saved: trending.json, trending_urls.txt, trending.md")

          asyncio.run(main())
          PYEOF

      - name: Download thumbnails via yt-dlp
        run: |
          pip install yt-dlp -q
          mkdir -p trending/thumbnails
          if [ ! -s trending/trending_urls.txt ]; then
            echo "No URLs, skipping."; exit 0
          fi
          i=1
          while IFS= read -r url; do
            echo "[$i] $url"
            yt-dlp \
              --write-thumbnail \
              --write-info-json \
              --skip-download \
              --output "trending/thumbnails/$(printf '%02d' $i)_%(uploader)s_%(id)s.%(ext)s" \
              "$url" 2>&1 || true
            i=$((i+1))
          done < trending/trending_urls.txt
          ls -lh trending/thumbnails/ | head -20

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add trending/ 2>/dev/null || true
          git diff --cached --quiet || git commit -m "chore: TikTok trending $(date -u '+%Y-%m-%d') [skip ci]"
          git push
