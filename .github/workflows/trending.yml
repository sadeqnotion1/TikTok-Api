name: Fetch TikTok Trending

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: write

jobs:
  fetch-trending:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install yt-dlp

      - name: Fetch top 50 trending via yt-dlp
        run: |
          mkdir -p trending/thumbnails

          echo "Fetching trending metadata..."
          yt-dlp \
            --flat-playlist \
            --print-json \
            --playlist-end 50 \
            "https://www.tiktok.com/trending" \
            > trending/raw.ndjson 2>&1 || true

          echo ""
          echo "Lines in raw output:"
          wc -l trending/raw.ndjson

      - name: Parse results and save files
        run: |
          python - <<'PYEOF'
          import json, time
          from pathlib import Path

          raw = Path("trending/raw.ndjson").read_text(errors="ignore")
          results = []
          for line in raw.splitlines():
              line = line.strip()
              if not line.startswith("{"):
                  continue
              try:
                  item = json.loads(line)
              except Exception:
                  continue
              vid_id  = item.get("id", "")
              author  = item.get("uploader") or item.get("uploader_id") or "unknown"
              desc    = item.get("title", "")[:120]
              likes   = item.get("like_count", 0) or 0
              plays   = item.get("view_count", 0) or 0
              url     = item.get("webpage_url") or f"https://www.tiktok.com/@{author}/video/{vid_id}"
              results.append({
                  "rank":   len(results) + 1,
                  "url":    url,
                  "author": author,
                  "id":     vid_id,
                  "desc":   desc,
                  "likes":  likes,
                  "plays":  plays,
              })
              print(f"  [{len(results):02d}] @{author}  ❤ {likes:,}")

          print(f"\nParsed: {len(results)} videos")

          if not results:
              print("WARNING: 0 results parsed — yt-dlp may not support /trending directly")
              exit(0)

          Path("trending/trending.json").write_text(
              json.dumps(results, indent=2, ensure_ascii=False))

          Path("trending/trending_urls.txt").write_text(
              "\n".join(r["url"] for r in results) + "\n")

          md = f"# TikTok Trending — {time.strftime('%Y-%m-%d %H:%M UTC')}\n\n"
          md += "| # | Author | Likes | Plays | Link |\n"
          md += "|---|--------|-------|-------|------|\n"
          for r in results:
              md += f"| {r['rank']} | @{r['author']} | {r['likes']:,} | {r['plays']:,} | [video]({r['url']}) |\n"
          Path("trending/trending.md").write_text(md)

          print("Files saved: trending.json, trending_urls.txt, trending.md")
          PYEOF

      - name: Download thumbnails
        run: |
          if [ ! -s trending/trending_urls.txt ]; then
            echo "No URLs, skipping thumbnails."; exit 0
          fi
          i=1
          while IFS= read -r url; do
            echo "[$i] $url"
            yt-dlp \
              --write-thumbnail \
              --write-info-json \
              --skip-download \
              --output "trending/thumbnails/$(printf '%02d' $i)_%(uploader)s_%(id)s.%(ext)s" \
              "$url" 2>&1 || true
            i=$((i+1))
          done < trending/trending_urls.txt
          ls -lh trending/thumbnails/ | head -20

      - name: Show raw output if empty
        if: always()
        run: |
          echo "=== raw.ndjson (first 50 lines) ==="
          head -50 trending/raw.ndjson 2>/dev/null || echo "(file missing)"

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add trending/ 2>/dev/null || true
          git diff --cached --quiet || git commit -m "chore: TikTok trending $(date -u '+%Y-%m-%d') [skip ci]"
          git push
